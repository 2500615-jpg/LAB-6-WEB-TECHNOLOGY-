<!DOCTYPE html>
<html>
<head>
<title>Weather App</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0px 8px 20px rgba(0,0,0,0.2);
}

h1{
color:#333;
margin-bottom:20px;
}

input{
width:80%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
outline:none;
margin-bottom:10px;
}

button{
padding:10px 20px;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0077ff;
}

.result{
margin-top:20px;
}

.result h2{
color:#333;
}

.result p{
font-size:18px;
color:#555;
}

#error{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🌤 Weather App</h1>

<input type="text" id="city" placeholder="Enter City Name">

<br>

<button onclick="getWeather()">Check Weather</button>

<div class="result">
<h2 id="cityName"></h2>
<p id="temp"></p>
<p id="condition"></p>
<p id="error"></p>
</div>

</div>

<script>

function getWeather(){

let city = document.getElementById("city").value;

let apiKey = "95e9449af3e25a8deb6d629f5896abed";

let url = "https://api.openweathermap.org/data/2.5/weather?q=" + city + "&appid=" + apiKey + "&units=metric";

fetch(url)
.then(response => response.json())
.then(data => {

if(data.cod != 200){
document.getElementById("error").innerHTML = data.message;
document.getElementById("cityName").innerHTML = "";
document.getElementById("temp").innerHTML = "";
document.getElementById("condition").innerHTML = "";
return;
}

document.getElementById("error").innerHTML = "";

document.getElementById("cityName").innerHTML = "📍 " + data.name;
document.getElementById("temp").innerHTML = "🌡 Temperature: " + data.main.temp + " °C";
document.getElementById("condition").innerHTML = "☁ Weather: " + data.weather[0].main;

localStorage.setItem("lastCity", city);

});

}

</script>

</body>
</html>
